<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="One Day Games playable demo surface.">
  <title>One Day Games Play</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17120f;
      --paper: #fff8eb;
      --line: rgba(23, 18, 15, 0.18);
      --muted: #6e5c51;
      --gold: #f6b44b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.55);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.7rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: var(--ink);
      font-weight: 800;
      text-decoration-color: var(--gold);
      text-decoration-thickness: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>One Day Games Play</h1>
    <p>This surface hosts direct-link playable demos. Public games are shared by their own links; private and partner previews are not listed here.</p>
  </main>
</body>
</html>
