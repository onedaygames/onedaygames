  <style>
    :root {
      color-scheme: dark;
      --ink: #fff7d7;
      --muted: #d8dfef;
      --gold: #ffd878;
      --blue: #182f54;
      --night: #071326;

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: radial-gradient(circle at 50% 0%, #315680 0%, var(--night) 62%, #040915 100%);
      color: var(--ink);
      padding: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #040915;
      color: var(--ink);
      border-bottom: 1px solid rgba(255, 247, 215, 0.16);
    }

    .header-inner {
      width: min(1100px, calc(100% - 40px));
      min-height: 60px;
      margin: 0 auto;
      padding: 9px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .brand img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 0;
      box-shadow: none;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 18px;
      min-width: 0;
      font-size: 0.92rem;
      font-weight: 900;
    }

    nav a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      padding: 5px 0;
    }

    nav a:hover,
    nav a:focus-visible {
      color: var(--gold);
      border-bottom-color: var(--gold);
      outline: none;
    }

    main {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 56px 24px;
    }

    footer {
      width: min(960px, calc(100% - 48px));
      margin: 0 auto;
      padding: 0 0 34px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    img {
      display: block;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      max-width: 720px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 22px;
      border-radius: 8px;
      background: var(--gold);
      color: #271907;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(255, 216, 120, 0.28);
    }

    .cta:focus-visible {
      outline: 3px solid #fff7d7;
      outline-offset: 4px;
    }

      .header-inner {
        width: min(362px, calc(100% - 28px));
        margin-left: 14px;
        margin-right: auto;
      }

      .brand span {
        display: none;
      }

      nav {
        flex-basis: 100%;
        justify-content: flex-start;
        gap: 10px;
        font-size: 0.82rem;
      }

      main {
        padding: 42px 14px;
      }

      footer {
        width: min(362px, calc(100% - 28px));
