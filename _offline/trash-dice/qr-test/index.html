<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Trash Dice QR Proof</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --paper: #fffdf8;
      --ink: #17242d;
      --muted: #5c6470;
      --line: #d7d0c2;
      --accent: #f5c800;
      --green: #0f5f32;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 44px);
      background:
        radial-gradient(circle at 50% 0%, rgba(245, 200, 0, 0.22), transparent 32rem),
        var(--bg);
      color: var(--ink);
      font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 340px);
      gap: clamp(18px, 4vw, 36px);
      align-items: center;
    }

    .copy {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 9vw, 5.5rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    p {
      max-width: 58ch;
      margin: 0 0 18px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.2rem);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0 0;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: var(--accent);
      color: var(--ink);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 3px 0 rgba(23, 36, 45, 0.24);
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      color: var(--ink);
      font-weight: 800;
      text-underline-offset: 4px;
    }

    .qr-panel {
      padding: clamp(14px, 3vw, 22px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 20px 60px rgba(23, 36, 45, 0.12);
    }

    .qr-panel img {
      display: block;
      width: 100%;
      height: auto;
      border: 10px solid #fff;
      background: #fff;
    }

    .target {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      overflow-wrap: anywhere;
    }

    .target strong {
      display: block;
      margin-bottom: 2px;
      color: var(--green);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      body {
        place-items: start center;
      }

      main {
        grid-template-columns: minmax(0, 1fr);
      }

      .qr-panel {
        width: min(420px, 100%);
        justify-self: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="copy" aria-labelledby="page-title">
      <p class="eyebrow">One Day Games QR proof</p>
      <h1 id="page-title">Trash Dice</h1>
      <p>This page verifies the permanent retail-safe QR path. Scan the code from another device, or open the same evergreen link directly.</p>
      <div class="actions">
        <a class="button" href="/trash-dice/play/">Open Trash Dice</a>
        <a class="text-link" href="/trash-dice/alpha-complete/">Alpha Complete build</a>
      </div>
    </section>
    <section class="qr-panel" aria-label="Trash Dice evergreen QR code">
      <img src="trash-dice-play-evergreen-qr-1024.png" width="1024" height="1024" alt="QR code for the permanent Trash Dice play link">
      <p class="target"><strong>QR target</strong>https://playonedaygames.com/trash-dice/play/</p>
    </section>
  </main>
</body>
</html>
