<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="refresh" content="0; url=/trash-dice/alpha-complete/">
  <title>Trash Dice</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --ink: #17242d;
      --muted: #586070;
      --line: #d8d2c4;
      --accent: #f5c800;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(480px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 8vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      border: 2px solid var(--ink);
      border-radius: 6px;
      background: var(--accent);
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Trash Dice</h1>
    <p>Opening the current playable build.</p>
    <a href="/trash-dice/alpha-complete/">Play Trash Dice</a>
  </main>
  <script>
    window.location.replace('/trash-dice/alpha-complete/');
  </script>
</body>
</html>
